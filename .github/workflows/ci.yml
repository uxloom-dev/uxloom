name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck and build
        run: npx tsc --build
      - name: Unit tests
        run: npx vitest run
      - name: Benchmark (regression gate)
        run: node src/run.mjs
        working-directory: packages/bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: packages/bench/results/
