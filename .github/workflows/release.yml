name: Release

# Push a version tag (v0.1.3) and this pipeline:
#   1. builds, tests, and benchmarks (regression gate — a worse grade aborts)
#   2. publishes any unpublished package versions to npm with provenance
#   3. publishes the new version to the official MCP registry (OIDC)
#   4. creates the GitHub release with the benchmark scorecard in the notes
#
# One-time setup: add an npm granular access token (read/write on the
# uxloom packages + org, "bypass 2FA" enabled) as repo secret NPM_TOKEN.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npx tsc --build
      - run: npx vitest run

      - name: Benchmark (release gate + scorecard)
        run: node src/run.mjs
        working-directory: packages/bench

      - name: Publish to npm (skips already-published versions)
        run: node tools/publish-if-needed.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to MCP registry (OIDC)
        continue-on-error: true
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Create GitHub release with benchmark scorecard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          {
            echo "## What's in ${TAG}"
            echo
            echo "_See commit history since the previous tag for details._"
            echo
            echo "## Benchmark scorecard for this release"
            echo
            cat packages/bench/results/REPORT.md
          } > release-notes.md
          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag
